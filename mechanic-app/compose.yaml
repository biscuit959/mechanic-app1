
version: "3.9"
services:
 # Backend service
  backend:
    image: ma_db:latest
    container_name: backend
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

    # Frontend service
    frontend:
    image: ma_fe:latest
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
